database:
  type: sqlite
  sqlite-file: data.db
  mysql:
    host: 127.0.0.1
    port: 3306
    database: automaillogin
    username: root
    password: change_me

mail:
  mode: mock
  from-address: no-reply@example.com
  from-name: AutoMailLogin
  server-name: AutoMailLogin Server
  support-email: support@example.com
  template-dir: templates
  code-length: 6
  code-expire-seconds: 300
  resend-cooldown-seconds: 60
  resend-cooldown-register-seconds: 60
  resend-cooldown-reset-seconds: 120
  resend-cooldown-second-factor-seconds: 60
  max-verify-attempts: 5
  max-verify-attempts-register: 5
  max-verify-attempts-reset: 4
  max-verify-attempts-second-factor: 5
  verify-lock-seconds: 300
  verify-lock-register-seconds: 300
  verify-lock-reset-seconds: 600
  verify-lock-second-factor-seconds: 300
  mock-log-sensitive-content: false
  allowed-domains: []
  blocked-domains: []
  smtp:
    host: smtp.example.com
    port: 587
    ssl: false
    starttls: true
    require-starttls: true
    connection-timeout-ms: 10000
    timeout-ms: 10000
    write-timeout-ms: 10000
    username: change_me
    password: change_me
    debug: false

security:
  password-min-length: 8
  max-login-attempts: 5
  lock-seconds: 300
  second-factor:
    enabled: true
    mode: on_new_ip
    trusted-days: 30

restriction:
  block-move: true
  block-chat: true
  block-interact: true
  block-inventory: true
  block-drop: true
  block-pickup: true
  allowed-commands:
    - /login
    - /mailregister
    - /mailcode
    - /mail2fa
    - /setpassword
    - /forgotpassword
    - /resetpassword
